<div class="page-enter admin-page">
  <div class="admin-header">
    <div>
      <h2 class="admin-title"><i class="bi bi-plus-circle me-2"></i>Add New Ground</h2>
      <p class="admin-sub">Fill in the details to add a cricket ground</p>
    </div>
    <a routerLink="/admin/grounds" class="btn-outline-custom"><i class="bi bi-arrow-left me-1"></i>Back</a>
  </div>

  <!-- Success -->
  <div class="success-banner" *ngIf="saved">
    <i class="bi bi-check-circle-fill me-2"></i>Ground added successfully! Redirecting...
  </div>

  <div class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="row g-4">

        <div class="col-md-6">
          <label class="form-label-custom">Ground Name *</label>
          <input type="text" formControlName="name" class="form-control-modern w-100" placeholder="e.g. Eden Sports Arena" />
          <div class="field-error" *ngIf="form.get('name')?.touched && form.get('name')?.errors?.['required']">Name is required</div>
        </div>

        <div class="col-md-6">
          <label class="form-label-custom">City *</label>
          <input type="text" formControlName="city" class="form-control-modern w-100" placeholder="e.g. Mumbai" />
          <div class="field-error" *ngIf="form.get('city')?.touched && form.get('city')?.errors?.['required']">City is required</div>
        </div>

        <div class="col-12">
          <label class="form-label-custom">Address *</label>
          <input type="text" formControlName="address" class="form-control-modern w-100" placeholder="Full address" />
          <div class="field-error" *ngIf="form.get('address')?.touched && form.get('address')?.errors?.['required']">Address is required</div>
        </div>

        <div class="col-12">
          <label class="form-label-custom">Description *</label>
          <textarea formControlName="description" class="form-control-modern w-100" rows="3" placeholder="Describe the ground..."></textarea>
          <div class="field-error" *ngIf="form.get('description')?.touched && form.get('description')?.errors?.['required']">Description is required</div>
        </div>

        <div class="col-12">
          <label class="form-label-custom">Image URL *</label>
          <input type="url" formControlName="image" class="form-control-modern w-100" placeholder="https://images.unsplash.com/..." />
          <div class="field-error" *ngIf="form.get('image')?.touched && form.get('image')?.errors?.['required']">Image URL is required</div>
          <div class="img-preview" *ngIf="form.get('image')?.value">
            <img [src]="form.get('image')?.value" alt="Preview" />
          </div>
        </div>

        <div class="col-md-4">
          <label class="form-label-custom">Price Per Hour (₹) *</label>
          <input type="number" formControlName="pricePerHour" class="form-control-modern w-100" min="100" />
          <div class="field-error" *ngIf="form.get('pricePerHour')?.touched && form.get('pricePerHour')?.errors?.['min']">Minimum ₹100</div>
        </div>

        <div class="col-md-4">
          <label class="form-label-custom">Rating (1–5)</label>
          <input type="number" formControlName="rating" class="form-control-modern w-100" min="1" max="5" step="0.1" />
        </div>

        <div class="col-md-4">
          <label class="form-label-custom">Available</label>
          <select formControlName="available" class="form-control-modern w-100">
            <option [ngValue]="true">Yes – Available</option>
            <option [ngValue]="false">No – Unavailable</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label-custom">Opening Time *</label>
          <input type="text" formControlName="openingTime" class="form-control-modern w-100" placeholder="06:00 AM" />
        </div>

        <div class="col-md-6">
          <label class="form-label-custom">Closing Time *</label>
          <input type="text" formControlName="closingTime" class="form-control-modern w-100" placeholder="10:00 PM" />
        </div>

        <div class="col-12">
          <label class="form-label-custom">Facilities</label>
          <div class="facilities-picker">
            <label class="fac-check" *ngFor="let f of allFacilities" [class.selected]="isFacilitySelected(f)" (click)="toggleFacility(f)">
              <input type="checkbox" [checked]="isFacilitySelected(f)" hidden />
              <i class="bi bi-check2 me-1"></i>{{ f }}
            </label>
          </div>
        </div>

        <div class="col-12">
          <button type="submit" class="btn-primary-custom save-btn">
            <i class="bi bi-floppy me-2"></i>Save Ground
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
