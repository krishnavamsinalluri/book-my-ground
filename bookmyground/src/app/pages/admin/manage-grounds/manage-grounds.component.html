<div class="page-enter admin-page">
  <div class="admin-header">
    <div>
      <h2 class="admin-title"><i class="bi bi-geo-alt me-2"></i>Manage Grounds</h2>
      <p class="admin-sub">{{ grounds.length }} grounds in total</p>
    </div>
    <a routerLink="/admin/grounds/add" class="btn-primary-custom">
      <i class="bi bi-plus-lg me-1"></i>Add Ground
    </a>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-responsive">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Ground</th>
            <th>Location</th>
            <th>Price</th>
            <th>Rating</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let g of grounds">
            <td>
              <div class="ground-cell">
                <img [src]="g.image" [alt]="g.name" class="ground-thumb" />
                <div>
                  <div class="ground-cell-name">{{ g.name }}</div>
                  <div class="ground-cell-id">ID: {{ g.id.slice(0,8) }}</div>
                </div>
              </div>
            </td>
            <td>
              <div class="location-cell"><i class="bi bi-geo-alt"></i>{{ g.city }}</div>
            </td>
            <td><span class="price-cell">₹{{ g.pricePerHour }}/hr</span></td>
            <td><span class="rating-cell"><i class="bi bi-star-fill"></i> {{ g.rating }}</span></td>
            <td>
              <button class="status-toggle" [class.active]="g.available" (click)="toggleAvailability(g)">
                {{ g.available ? 'Available' : 'Unavailable' }}
              </button>
            </td>
            <td>
              <div class="actions-cell">
                <a [routerLink]="['/grounds', g.id]" class="action-btn view" title="View"><i class="bi bi-eye"></i></a>
                <a [routerLink]="['/admin/grounds/edit', g.id]" class="action-btn edit" title="Edit"><i class="bi bi-pencil"></i></a>
                <button class="action-btn delete" title="Delete" (click)="confirmDelete(g.id)"><i class="bi bi-trash"></i></button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="empty-state" *ngIf="grounds.length === 0">
      <i class="bi bi-geo-alt" style="font-size:2.5rem;color:#d1d5db;display:block;margin-bottom:12px"></i>
      No grounds found. <a routerLink="/admin/grounds/add">Add one now.</a>
    </div>
  </div>
</div>

<!-- Delete Confirm Modal -->
<div class="confirm-backdrop" *ngIf="deleteId" (click)="deleteId = null"></div>
<div class="confirm-dialog" *ngIf="deleteId">
  <div class="confirm-icon"><i class="bi bi-trash3-fill"></i></div>
  <h5>Delete Ground?</h5>
  <p>This action cannot be undone.</p>
  <div class="confirm-actions">
    <button class="btn-cancel" (click)="deleteId = null">Cancel</button>
    <button class="btn-delete" (click)="doDelete()">Delete</button>
  </div>
</div>
