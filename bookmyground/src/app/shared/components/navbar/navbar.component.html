      <i class="bi bi-cricket me-2"></i>BookMyGround
    </a>

    <button class="navbar-toggler" type="button" (click)="menuOpen = !menuOpen" aria-label="Toggle navigation">
      <i class="bi" [class.bi-x-lg]="menuOpen" [class.bi-list]="!menuOpen"></i>
    </button>

    <div class="navbar-collapse" [class.show]="menuOpen">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">

        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/grounds" routerLinkActive="active">Grounds</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/about" routerLinkActive="active">About</a>

        <li class="nav-item">
          <a class="nav-link" routerLink="/contact" routerLinkActive="active">Contact</a>
        </li>

            <i class="bi bi-shield-lock me-1"></i>Admin
          </a>
